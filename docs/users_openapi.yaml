openapi: 3.0.3
info:
  title: Shop Project Users API
  version: 1.0.0
  description: |
    Strict OpenAPI contract for the users/auth module based on the current implementation.

    Notes:
    - Effective runtime paths in this project are typically prefixed by `/api`.
    - Protected endpoints require `Authorization: Bearer <access_token>`.
    - Response envelope format:
      - Success: `{ "success": true, "message": string, "data": any }`
      - Error: `{ "success": false, "error": string }`
servers:
  - url: http://127.0.0.1:8000
    description: Local

tags:
  - name: Auth
  - name: Users

paths:
  /api/auth/register/:
    post:
      tags: [Auth]
      summary: Register user
      description: |
        Public endpoint.
        Role rules from service layer:
        - CUSTOMER: self-registration flow.
        - STAFF: only ADMIN actor can create; requires valid staff key.
        - ADMIN: requires valid admin key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              adminRegister:
                value:
                  name: Admin One
                  email: admin@example.com
                  age: 30
                  password: Pass1234
                  phone_number: "+923001111111"
                  role: ADMIN
                  key: Sahal_Saaim_super_key
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccessResponse'
        '400':
          description: Validation or business rule error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/login/:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccessResponse'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/logout/:
    post:
      tags: [Auth]
      summary: Logout
      description: |
        Requires authenticated access token.
        - Blacklists bearer access token.
        - Also blacklists `refresh` token when provided in body.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh:
                  type: string
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccessResponse'
        '401':
          description: Missing/invalid/expired/revoked access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/refresh/:
    post:
      tags: [Auth]
      summary: Refresh token pair
      description: |
        Public endpoint expecting a refresh token in body.
        - Input token must be of type `refresh`.
        - Old refresh token is blacklisted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshSuccessResponse'
        '400':
          description: Missing refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid token type/token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/:
    get:
      tags: [Users]
      summary: List all users
      description: Admin only.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Users fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListSuccessResponse'
        '403':
          description: Only admin can list users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/me/:
    get:
      tags: [Users]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccessResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/{user_id}/:
    post:
      tags: [Users]
      summary: Get user by ID
      description: Admin only.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: User fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccessResponse'
        '403':
          description: Only admin can view users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      tags: [Users]
      summary: Update user by ID
      description: |
        Allowed for admin or self.
        Rules:
        - Only admin can set `role`.
        - If admin updates someone else and target role is CUSTOMER, request is rejected.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccessResponse'
        '400':
          description: Validation/business rule error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/profile_data/{user_id}/:
    get:
      tags: [Users]
      summary: Get profile data by user id
      description: Admin or self only.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: Profile data fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccessResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/delete/{user_id}/:
    delete:
      tags: [Users]
      summary: Delete user
      description: |
        Admin can delete any user.
        Any authenticated user can delete self (`me` or own id).
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSuccessResponse'
        '403':
          description: Only admin can delete other users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UserIdParam:
      name: user_id
      in: path
      required: true
      schema:
        type: string
      description: Mongo ObjectId as string, or `me` where endpoint supports it.

  schemas:
    Role:
      type: string
      enum: [CUSTOMER, STAFF, ADMIN]

    User:
      type: object
      required:
        - id
        - name
        - email
        - age
        - phone_number
        - role
        - image
        - created_at
        - updated_at
      properties:
        id:
          type: string
        name:
          type: string
          maxLength: 120
        email:
          type: string
          format: email
        age:
          type: integer
          minimum: 18
          maximum: 90
        phone_number:
          type: string
          maxLength: 20
        role:
          $ref: '#/components/schemas/Role'
        image:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required:
        - name
        - email
        - age
        - password
        - phone_number
      properties:
        name:
          type: string
          maxLength: 120
        email:
          type: string
          format: email
        age:
          type: integer
          minimum: 18
          maximum: 90
        password:
          type: string
          minLength: 8
          description: Must contain letters and numbers.
        phone_number:
          type: string
          maxLength: 20
        role:
          $ref: '#/components/schemas/Role'
          default: CUSTOMER
        image:
          type: string
        key:
          type: string
          description: Required for STAFF/ADMIN creation according to role rules.

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshRequest:
      type: object
      required: [refresh]
      properties:
        refresh:
          type: string

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 120
        email:
          type: string
          format: email
        age:
          type: integer
          minimum: 18
          maximum: 90
        phone_number:
          type: string
          maxLength: 20
        image:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        old_password:
          type: string
          minLength: 8
        new_password:
          type: string
          minLength: 8
      description: old_password and new_password must be provided together.

    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: string

    GenericSuccessResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          type: object
          additionalProperties: true

    UserSuccessResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: '#/components/schemas/User'

    UserListSuccessResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'

    LoginSuccessData:
      type: object
      required: [access, refresh, user]
      properties:
        access:
          type: string
        refresh:
          type: string
        user:
          $ref: '#/components/schemas/User'

    LoginSuccessResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: '#/components/schemas/LoginSuccessData'

    RefreshSuccessData:
      type: object
      required: [access, refresh]
      properties:
        access:
          type: string
        refresh:
          type: string

    RefreshSuccessResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: '#/components/schemas/RefreshSuccessData'

    DeleteSuccessResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          type: object
          required: [deleted]
          properties:
            deleted:
              type: boolean
              enum: [true]
